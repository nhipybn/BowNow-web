<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub | Chuyên gia Marketing B2B - BowNow</title>
    <meta name="description" content="Kho kiến thức chuyên sâu về SEO B2B và Marketing Automation.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-mesh {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.03) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(30, 58, 138, 0.03) 0px, transparent 50%);
        }
        .blog-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .blog-card:hover { transform: translateY(-8px); }
        .blog-card:hover .blog-image { transform: scale(1.08); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #contact-modal.hidden { display: none; }
        #contact-modal.flex { display: flex; }
    </style>
</head>
<body class="bg-white text-slate-900 antialiased bg-mesh">

    <!-- NAVIGATION BAR -->
    <header class="fixed w-full top-0 z-[100] bg-white/80 backdrop-blur-md border-b border-slate-100">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent italic uppercase tracking-tighter">
                <a href="index.html">BowNow.</a>
            </div>
            <div class="hidden lg:flex space-x-10 font-bold text-slate-500 text-[10px] uppercase tracking-[0.2em]">
                <a href="index.html" class="hover:text-blue-600 transition">Trang chủ</a>
                <a href="saas_bownow.html" class="hover:text-blue-600 transition">Hệ thống</a>
                <a href="bposervice.html" class="hover:text-blue-600 transition">Dịch vụ BPO</a>
                <a href="pricing.html" class="hover:text-blue-600 transition">Bảng giá</a>
                <a href="blog.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Blog</a>
            </div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-semibold text-sm">Liên hệ tư vấn</button>
        </nav>
    </header>

    <main class="pt-32">
        <!-- HERO -->
        <section class="py-16 text-center container mx-auto px-6">
            <h1 class="text-4xl md:text-7xl font-black text-slate-900 tracking-tighter uppercase italic mb-6">
                Knowledge <span class="text-blue-600">Hub</span>
            </h1>
            <p class="text-slate-500 max-w-2xl mx-auto italic font-medium">Cập nhật những chiến lược MarTech mới nhất từ chuyên gia.</p>
        </section>

        <!-- BLOG GRID -->
        <section class="py-24 bg-white">
            <div class="container mx-auto px-6">
                <!-- Đây là nơi JavaScript sẽ tự động đổ dữ liệu bài viết vào -->
                <div id="blog-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-12 max-w-6xl mx-auto">
                    <!-- Loading state -->
                    <p class="text-center col-span-full text-slate-400 animate-pulse">Đang tải kiến thức mới nhất...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white pt-20 pb-12 text-slate-400 border-t border-slate-100">
        <div class="container mx-auto px-6 text-center">
            <div class="text-2xl font-black text-slate-900 italic">BowNow<span class="text-blue-600">.</span></div>
            <p class="text-[10px] uppercase font-bold tracking-widest mt-4">© 2024 BowNow B2B - POWERED BY BOWNOW</p>
        </div>
    </footer>

    <!-- MODAL FORM -->
    <div id="contact-modal" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-slate-950/90 backdrop-blur-md">
        <div class="bg-white w-full max-w-xl rounded-[4rem] shadow-2xl p-12 relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-400 hover:text-slate-900 font-black">✕</button>
            <h3 class="text-2xl font-black text-center uppercase italic mb-8">Tư vấn Giải pháp</h3>
            <form id="lead-form" class="space-y-4">
                <input type="text" placeholder="Họ và tên" class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition">
                <input type="email" placeholder="Email doanh nghiệp" class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition">
                <button type="submit" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl uppercase italic tracking-widest">Gửi thông tin</button>
            </form>
        </div>
    </div>

    <!-- SCRIPTS XỬ LÝ TỰ ĐỘNG HÓA -->
    <script>
        lucide.createIcons();

        // 1. DANH SÁCH BÀI VIẾT (BẠN CHỈ CẦN CẬP NHẬT TẠI ĐÂY)
        // Mỗi khi có bài mới, hãy copy 1 cụm {} và dán lên đầu danh sách
        const POSTS_DATA = [
            {
                title: "5 Kịch bản Email Automation giúp tăng 40% doanh thu",
                description: "Khai thác dữ liệu hành vi từ BowNow để nuôi dưỡng khách hàng tiềm năng...",
                image: "https://images.unsplash.com/photo-1557200134-90327ee9fafa?auto=format&fit=crop&w=800&q=80",
                category: "Automation",
                date: "05 Tháng 3, 2024",
                link: "post-automation-01.html"
            },
            {
                title: "SEO B2B: Tại sao Authority quan trọng hơn Traffic?",
                description: "Tìm hiểu cách xây dựng vị thế chuyên gia để thu hút khách hàng doanh nghiệp chất lượng.",
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80",
                category: "SEO B2B",
                date: "02 Tháng 3, 2024",
                link: "post-seo-authority.html"
            },
            {
                title: "Case Study: Tăng x3 Lead cho Công ty Luật trong 12 tháng",
                description: "Phân tích quy trình số hóa danh sách khách hàng của dự án Luật CAST Việt Nam.",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=800&q=80",
                category: "Case Study",
                date: "25 Tháng 2, 2024",
                link: "case-study-cast.html"
            }
        ];

        // 2. HÀM TỰ ĐỘNG RENDER BÀI VIẾT
        function renderPosts() {
            const grid = document.getElementById('blog-grid');
            if (!grid) return;

            const html = POSTS_DATA.map(post => `
                <article class="blog-card flex flex-col group">
                    <a href="${post.link}" class="block">
                        <div class="rounded-[2.5rem] overflow-hidden mb-6 aspect-[4/3] relative bg-slate-100 shadow-sm">
                            <img src="${post.image}" alt="${post.title}" class="blog-image w-full h-full object-cover transition-transform duration-700">
                            <div class="absolute top-6 left-6 bg-white/90 px-4 py-1.5 rounded-full text-[9px] font-black text-blue-600 uppercase tracking-widest shadow-sm">${post.category}</div>
                        </div>
                    </a>
                    <div class="px-2">
                        <time class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${post.date}</time>
                        <h3 class="text-xl font-black text-slate-900 mt-3 mb-4 uppercase italic tracking-tighter leading-tight group-hover:text-blue-600 transition">
                            <a href="${post.link}">${post.title}</a>
                        </h3>
                        <p class="text-sm text-slate-500 font-medium leading-relaxed line-clamp-2">
                            ${post.description}
                        </p>
                    </div>
                </article>
            `).join('');

            grid.innerHTML = html;
        }

        // Chạy hàm khi trang tải xong
        window.onload = renderPosts;

        // LOGIC MODAL (Dùng chung)
        const modal = document.getElementById('contact-modal');
        window.openModal = () => { modal.classList.remove('hidden'); modal.classList.add('flex'); document.body.style.overflow = 'hidden'; };
        window.closeModal = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = 'auto'; };
    </script>
</body>
</html>
